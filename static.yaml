api:
  dashboard: true
  insecure: false

entryPoints:
  lan:
    address: ":8080"
    transport:
      lifeCycle:
        requestAcceptGraceTimeout: 30s
        graceTimeOut: 30s
      respondingTimeouts:
        readTimeout: 60s
        writeTimeout: 60s
        idleTimeout: 300s
  web:
    address: ":80"
    #address: "[::]:80"
    #ipv6: true
    #http:
     # redirections:
      #  entryPoint:
       #   to: websecure
        #  scheme: https
         # permanent: true
    transport:
      lifeCycle:
        requestAcceptGraceTimeout: 30s
        graceTimeOut: 30s
      respondingTimeouts:
        readTimeout: 60s
        writeTimeout: 60s
        idleTimeout: 300s
  websecure:
    #ipv6: true
    address: ":443"
    #address: "[::]:443"
    http2:
      maxConcurrentStreams: 250
    forwardedHeaders:
      trustedIPs:
        - "192.168.1.0/24"   # Example: Internal reverse proxy
        - "10.200.22.0/24"   # VPN IP range (if Traefik itself should trust VPN forwarded headers)
    transport:
      lifeCycle:
        requestAcceptGraceTimeout: 30s
        graceTimeOut: 30s
      respondingTimeouts:
        readTimeout: 60s
        writeTimeout: 120s
        idleTimeout: 300s
  steamcmd_udp:
    address: ":8211/udp"
  factorio:
    address: ":34197/udp"
  mqtt:
    address: ":1883"

metrics:
  addInternals: true

tracing:

serversTransport:
  forwardingTimeouts:
    dialTimeout: 30s
    responseHeaderTimeout: 60s
    idleConnTimeout: 300s
  maxIdleConnsPerHost: 100


certificatesResolvers:
  myresolver:
    acme:
      email: alex@actuary.llc
      storage: /mnt/user/docker/volumes/traefik/letsencrypt/acme.json
      #caserver: https://acme-staging-v02.api.letsencrypt.org/directory
      dnsChallenge:
        provider: cloudflare
        delayBeforeCheck: 90
        disablePropagationCheck: true
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"
        
log:
#  filePath: /mnt/user/docker/volumes/traefik/logs/traefik.log
#  level: DEBUG
accessLog:
#  filePath: /mnt/user/docker/volumes/traefik/logs/access.log
  addInternals: true
  fields:
    defaultMode: keep
    names:
      ClientUsername: drop
    headers:
      defaultMode: keep
      names:
        User-Agent: keep
        Authorization: keep
        Content-Type: keep

providers:
  swarm:
    exposedByDefault: false
    watch: true
    network: "reverse-proxy"
    endpoint: "unix:///var/run/docker.sock"
  file:
    filename: /mnt/user/docker/volumes/traefik/dynamic/config.yaml
    watch: true
